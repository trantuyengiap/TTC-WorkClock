services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: workclock
      POSTGRES_USER: workclock
      POSTGRES_PASSWORD: workclock
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - '1025:1025'
      - '8025:8025'

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.1
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - '9200:9200'


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis
      - mailhog
      - elasticsearch
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - backend
      - redis
      - postgres
    volumes:
      - ./backend:/app
    command: sh -c "python -m app.seed && celery -A app.services.scheduler.celery_app.celery_app worker --loglevel=info"

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - worker
    volumes:
      - ./backend:/app
    command: sh -c "celery -A app.services.scheduler.celery_app.celery_app beat --loglevel=info"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
